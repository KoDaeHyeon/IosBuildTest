# YAML 파일 일부 예시 (추후 회사 프로젝트 적용 시)
- name: Unity Build
  uses: game-ci/unity-builder@v4
  env:
    UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
    UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
    UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
  with:
    targetPlatform: iOS
    # 유니티에 C#으로 미리 짜둔 커스텀 빌드 함수를 호출하도록 지정
    buildMethod: MyCompany.Builder.BuildIOS